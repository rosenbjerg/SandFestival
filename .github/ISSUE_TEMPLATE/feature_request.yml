name: Feature request
description: Suggest an idea or improvement for Sand Festival
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Lead with the problem you're trying to solve — that makes it much easier to evaluate whether a proposed solution is the right shape.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's getting in the way today? Real workflows beat hypotheticals.
      placeholder: |
        When I have ten projects running at once, I can't tell which one ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Sand Festival to behave? UI sketches, key shortcuts, settings — whatever's concrete.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or workarounds you're using now.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Roughly where in the app does this live?
      options:
        - Sidebar / project list
        - Terminal pane
        - Menu bar / attention indicator
        - Project settings
        - Hook integration with Claude Code
        - Adapters / multi-agent support
        - Packaging / release / distribution
        - Other
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
